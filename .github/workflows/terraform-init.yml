name: "Terraform Init"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      TF_API_TOKEN:
        required: true
      TF_CLOUD_ORGANIZATION:
        required: true

jobs:
  init:
    name: "Init (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      # TFC authentication — must be set before any terraform command
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      # Workspace naming convention: <org>-<environment>
      # e.g. my-org-dev, my-org-qa, my-org-prod
      TF_WORKSPACE: ${{ secrets.TF_CLOUD_ORGANIZATION }}-${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ARM environment variables
        run: |
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      # TFC remote backend is configured via cloud{} block in backend.tf
      # No -backend-config flags needed — workspace is resolved via TF_WORKSPACE env var
      - name: Terraform Init
        run: |
          terraform init \
            -input=false \
            -reconfigure

      - name: Verify Terraform Init
        run: terraform version
